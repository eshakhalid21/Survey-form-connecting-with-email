<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>
<body>

    <center>
        <h1 id="title">Post Event Feedback</h1>
        <p id="description">We value your feedback!</p>
    </center>

    <form action="https://formsubmit.co/eshakhalid210@gmail.com" method="POST">

        <label for="name">Name</label><br>
        <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter Your Name"
            required>
        <br><br>

        <label for="email">Email</label><br>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter Your Email"
            required>
        <br><br>

        <label for="age">Age</label><br>
        <input
            type="number"
            id="age"
            name="age"
            min="13"
            max="55"
            placeholder="Enter Your Age"
            required>
        <br><br>

        <label for="dropdown">What type of event did you attend?</label>
        <br><br>

        <select id="dropdown" name="event" required>
            <option value="" disabled selected>Select the event</option>
            <option value="Workshop">Workshop</option>
            <option value="AMA">AMA with the Guests</option>
            <option value="Bootcamp">Bootcamp</option>
            <option value="Activity Pen">Activity Pen</option>
        </select>

        <br><br>

        <p><strong>How was your experience?</strong></p>

        <input type="radio" id="good" name="experience" value="Good">
        <label for="good">Good</label><br>

        <input type="radio" id="not-bad" name="experience" value="Not Bad">
        <label for="not-bad">Not Bad</label><br>

        <input type="radio" id="bad" name="experience" value="Bad">
        <label for="bad">Bad</label>

        <br><br>

        <p><strong>What type of events would you like to see from us?</strong></p>

        <input type="checkbox" id="workshops" name="future_event" value="Workshops">
        <label for="workshops">Workshops</label><br>

        <input type="checkbox" id="bootcamps" name="future_event" value="Bootcamps">
        <label for="bootcamps">Bootcamps</label><br>

        <input type="checkbox" id="activity" name="future_event" value="Activity Pen">
        <label for="activity">Activity Pen</label>

        <br><br>

        <label for="suggestions">Do you have any more suggestions?</label>
        <br><br>

        <textarea
            id="suggestions"
            name="suggestions"
            rows="5"
            cols="40"
            placeholder="We love suggestions!"></textarea>

        <br><br>

        <button type="submit" id="submit">SUBMIT</button>

    </form>

</body>
</html>
